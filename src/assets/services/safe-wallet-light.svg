<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Safe Wallet Deployment</title>
  <desc>Abstract illustration of a secure vault representing Safe wallet deployment</desc>

  <!-- background -->
  <rect width="400" height="260" fill="#f2f0ed" rx="12"/>

  <!-- grid lines -->
  <line x1="0" y1="65" x2="400" y2="65" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="0" y1="130" x2="400" y2="130" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="100" y1="0" x2="100" y2="260" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="300" y1="0" x2="300" y2="260" stroke="#dedad6" stroke-width="0.75"/>

  <!-- vault body -->
  <rect x="100" y="40" width="200" height="180" rx="10" fill="#e8e4df" stroke="#e85d2f" stroke-width="1.5"/>

  <!-- vault door ring outer -->
  <circle cx="200" cy="130" r="60" fill="none" stroke="#e85d2f" stroke-width="2"/>
  <!-- vault door ring inner dashed -->
  <circle cx="200" cy="130" r="42" fill="none" stroke="#e85d2f" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- inner fill tint -->
  <circle cx="200" cy="130" r="42" fill="#e85d2f" opacity="0.06"/>

  <!-- spokes -->
  <line x1="200" y1="70" x2="200" y2="100" stroke="#e85d2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="160" x2="200" y2="190" stroke="#e85d2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="130" x2="170" y2="130" stroke="#e85d2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="130" x2="260" y2="130" stroke="#e85d2f" stroke-width="2" stroke-linecap="round"/>

  <!-- diagonal spokes -->
  <line x1="157" y1="87" x2="179" y2="109" stroke="#e85d2f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="243" y1="87" x2="221" y2="109" stroke="#e85d2f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="157" y1="173" x2="179" y2="151" stroke="#e85d2f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="243" y1="173" x2="221" y2="151" stroke="#e85d2f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- center lock -->
  <circle cx="200" cy="130" r="14" fill="#e85d2f"/>
  <circle cx="200" cy="130" r="8" fill="#c44a22"/>

  <!-- handle bar -->
  <rect x="188" y="198" width="24" height="8" rx="4" fill="#e85d2f" opacity="0.8"/>

  <!-- corner accent dots -->
  <circle cx="118" cy="58" r="4" fill="#e85d2f" opacity="0.3"/>
  <circle cx="282" cy="58" r="4" fill="#e85d2f" opacity="0.3"/>
  <circle cx="118" cy="202" r="4" fill="#e85d2f" opacity="0.3"/>
  <circle cx="282" cy="202" r="4" fill="#e85d2f" opacity="0.3"/>

  <!-- chain count badge -->
  <rect x="300" y="20" width="82" height="22" rx="5" fill="#e8e4df" stroke="#e85d2f" stroke-width="0.75" opacity="0.9"/>
  <text x="341" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#c44a22" opacity="0.9">100+ chains</text>
</svg>
