<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Explorer</title>
  <desc>Chain of blocks with a search bar</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/><stop offset="100%" stop-color="#1a1620"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c"/><stop offset="35%" stop-color="#d94d4d"/>
      <stop offset="70%" stop-color="#8a5cd1"/><stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="gFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)" rx="12"/>
  <rect x="30" y="28" width="340" height="32" rx="16" fill="none" stroke="url(#g)" stroke-width="1"/>
  <text x="58" y="49" font-family="monospace" font-size="11" fill="#cfd2dc" opacity="0.8">0x13f4a2c8...35cc</text>
  <circle cx="46" cy="44" r="6" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <line x1="50" y1="49" x2="55" y2="54" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <g>
    <rect x="20" y="90" width="78" height="72" rx="8" fill="url(#gFill)" stroke="url(#g)" stroke-width="1"/>
    <text x="59" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.65">#25079</text>
    <text x="59" y="132" text-anchor="middle" font-family="monospace" font-size="12" fill="#f0eef5" font-weight="700">12 tx</text>
    <text x="59" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#9095a8">2h ago</text>
  </g>
  <line x1="98" y1="126" x2="118" y2="126" stroke="url(#g)" stroke-width="2"/>
  <polygon points="118,122 126,126 118,130" fill="url(#g)"/>
  <g>
    <rect x="126" y="90" width="78" height="72" rx="8" fill="url(#gFill)" stroke="url(#g)" stroke-width="1"/>
    <text x="165" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.65">#25080</text>
    <text x="165" y="132" text-anchor="middle" font-family="monospace" font-size="12" fill="#f0eef5" font-weight="700">8 tx</text>
    <text x="165" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#9095a8">2h ago</text>
  </g>
  <line x1="204" y1="126" x2="224" y2="126" stroke="url(#g)" stroke-width="2"/>
  <polygon points="224,122 232,126 224,130" fill="url(#g)"/>
  <g>
    <rect x="232" y="82" width="86" height="88" rx="8" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.75"/>
    <text x="275" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#f0eef5" font-weight="700">LATEST</text>
    <text x="275" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.7">#25081</text>
    <text x="275" y="138" text-anchor="middle" font-family="monospace" font-size="14" fill="#f0eef5" font-weight="700">46 tx</text>
    <text x="275" y="156" text-anchor="middle" font-family="monospace" font-size="8" fill="#cfd2dc" opacity="0.6">scanning...</text>
  </g>
  <line x1="318" y1="126" x2="338" y2="126" stroke="url(#g)" stroke-width="1.25" stroke-dasharray="3,3" opacity="0.6"/>
  <rect x="338" y="98" width="44" height="56" rx="6" fill="none" stroke="url(#g)" stroke-width="0.75" opacity="0.4"/>
  <text x="360" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#cfd2dc" opacity="0.4">···</text>
  <rect x="30" y="196" width="200" height="7" rx="3" fill="url(#g)" opacity="0.35"/>
  <rect x="30" y="210" width="280" height="7" rx="3" fill="url(#g)" opacity="0.22"/>
  <rect x="30" y="224" width="150" height="7" rx="3" fill="url(#g)" opacity="0.15"/>
  <rect x="254" y="192" width="80" height="15" rx="7" fill="none" stroke="url(#g)" stroke-width="0.75"/>
  <text x="294" y="203" text-anchor="middle" font-family="monospace" font-size="8" fill="#cfd2dc">contract call</text>
  <rect x="338" y="207" width="52" height="15" rx="7" fill="none" stroke="url(#g)" stroke-width="0.75"/>
  <text x="364" y="218" text-anchor="middle" font-family="monospace" font-size="8" fill="#cfd2dc">transfer</text>
