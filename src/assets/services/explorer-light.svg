<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Block Explorer and Customization</title>
  <desc>Chain of blocks with search interface representing Blockscout explorer deployment</desc>

  <rect width="400" height="260" fill="#f2f0ed" rx="12"/>

  <!-- subtle grid -->
  <line x1="0" y1="65" x2="400" y2="65" stroke="#dedad6" stroke-width="0.75"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#dedad6" stroke-width="0.75"/>

  <!-- search bar -->
  <rect x="30" y="28" width="340" height="32" rx="6" fill="#ffffff" stroke="#c8c4be" stroke-width="1"/>
  <text x="56" y="49" font-family="monospace" font-size="11" fill="#8a9eb0">0x13f4a2c8...35cc</text>
  <!-- magnifier -->
  <circle cx="46" cy="44" r="6" fill="none" stroke="#2563a8" stroke-width="1.5"/>
  <line x1="50" y1="49" x2="55" y2="54" stroke="#2563a8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- kbd hint -->
  <rect x="348" y="36" width="16" height="16" rx="3" fill="#e8e4df" stroke="#c8c4be" stroke-width="0.75"/>
  <text x="356" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">/</text>

  <!-- block 1 -->
  <rect x="20" y="90" width="78" height="72" rx="6" fill="#e0eaf5" stroke="#2563a8" stroke-width="1"/>
  <text x="59" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563a8" opacity="0.6">#25079</text>
  <text x="59" y="130" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a4a80" font-weight="700">12 tx</text>
  <text x="59" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#6a8aaa">2h ago</text>

  <!-- connector -->
  <line x1="98" y1="126" x2="112" y2="126" stroke="#2563a8" stroke-width="2"/>
  <polygon points="112,122 120,126 112,130" fill="#2563a8"/>

  <!-- block 2 -->
  <rect x="120" y="90" width="78" height="72" rx="6" fill="#e0eaf5" stroke="#2563a8" stroke-width="1"/>
  <text x="159" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563a8" opacity="0.6">#25080</text>
  <text x="159" y="130" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a4a80" font-weight="700">8 tx</text>
  <text x="159" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#6a8aaa">2h ago</text>

  <!-- connector -->
  <line x1="198" y1="126" x2="212" y2="126" stroke="#2563a8" stroke-width="2"/>
  <polygon points="212,122 220,126 212,130" fill="#2563a8"/>

  <!-- block 3 — highlighted/latest -->
  <rect x="220" y="82" width="86" height="88" rx="6" fill="#c8daf5" stroke="#2563a8" stroke-width="2"/>
  <rect x="222" y="84" width="82" height="22" rx="4" fill="#2563a8" opacity="0.15"/>
  <text x="263" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a4a80">LATEST</text>
  <text x="263" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563a8" opacity="0.7">#25081</text>
  <text x="263" y="136" text-anchor="middle" font-family="monospace" font-size="13" fill="#1a4a80" font-weight="700">46 tx</text>
  <text x="263" y="154" text-anchor="middle" font-family="monospace" font-size="8" fill="#2563a8" opacity="0.5">scanning...</text>

  <!-- connector dashed -->
  <line x1="306" y1="126" x2="320" y2="126" stroke="#b0b8c8" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- block 4 — pending -->
  <rect x="320" y="90" width="60" height="72" rx="6" fill="#e8e4df" stroke="#c8c4be" stroke-width="1"/>
  <text x="350" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#b0aaa2">· · ·</text>

  <!-- tx rows -->
  <rect x="30" y="196" width="200" height="7" rx="3" fill="#c8d8e8"/>
  <rect x="30" y="210" width="280" height="7" rx="3" fill="#c0d0e0"/>
  <rect x="30" y="224" width="150" height="7" rx="3" fill="#b8c8d8"/>
  <!-- dots -->
  <circle cx="244" cy="200" r="4" fill="#2563a8" opacity="0.5"/>
  <circle cx="324" cy="214" r="4" fill="#2563a8" opacity="0.3"/>
  <circle cx="194" cy="228" r="4" fill="#2563a8" opacity="0.2"/>
  <!-- badges -->
  <rect x="254" y="192" width="80" height="15" rx="3" fill="#dce8f5" stroke="#2563a8" stroke-width="0.5"/>
  <text x="294" y="203" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a4a80">contract call</text>
  <rect x="334" y="207" width="56" height="15" rx="3" fill="#dce8f5" stroke="#2563a8" stroke-width="0.5"/>
  <text x="362" y="218" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a4a80">transfer</text>
</svg>
