<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Treasury</title>
  <desc>Treasury card with payout chart and spending controls</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/><stop offset="100%" stop-color="#1a1620"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c"/><stop offset="35%" stop-color="#d94d4d"/>
      <stop offset="70%" stop-color="#8a5cd1"/><stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="gFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)" rx="12"/>
  <rect x="30" y="36" width="200" height="120" rx="12" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.25"/>
  <text x="46" y="62" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.7">TREASURY CARD</text>
  <text x="46" y="98" font-family="monospace" font-size="20" fill="#f0eef5" font-weight="700" letter-spacing="2">**** 4271</text>
  <text x="46" y="130" font-family="monospace" font-size="11" fill="#f0eef5" opacity="0.85">$ 1,284,500.00</text>
  <circle cx="200" cy="130" r="10" fill="url(#g)" opacity="0.9"/>
  <circle cx="212" cy="130" r="10" fill="url(#g)" opacity="0.5"/>
  <rect x="244" y="36" width="126" height="120" rx="10" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
  <text x="256" y="58" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.55">PAYOUTS / 30D</text>
  <rect x="256" y="76" width="14" height="62" rx="3" fill="url(#gBar)" opacity="0.5"/>
  <rect x="274" y="84" width="14" height="54" rx="3" fill="url(#gBar)" opacity="0.65"/>
  <rect x="292" y="70" width="14" height="68" rx="3" fill="url(#gBar)" opacity="0.9"/>
  <rect x="310" y="92" width="14" height="46" rx="3" fill="url(#gBar)" opacity="0.55"/>
  <rect x="328" y="80" width="14" height="58" rx="3" fill="url(#gBar)" opacity="0.75"/>
  <rect x="346" y="100" width="14" height="38" rx="3" fill="url(#gBar)" opacity="0.5"/>
  <rect x="30" y="180" width="340" height="48" rx="10" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.6"/>
  <circle cx="54" cy="204" r="9" fill="url(#g)" opacity="0.85"/>
  <text x="54" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f0f12" font-weight="700">✓</text>
  <text x="74" y="202" font-family="monospace" font-size="10" fill="#f0eef5" font-weight="700">Spending limit</text>
  <text x="74" y="216" font-family="monospace" font-size="9" fill="#9095a8">50,000 USDC / day</text>
  <rect x="220" y="194" width="130" height="22" rx="11" fill="none" stroke="url(#g)" stroke-width="1"/>
  <rect x="222" y="196" width="86" height="18" rx="9" fill="url(#g)" opacity="0.55"/>
</svg>
