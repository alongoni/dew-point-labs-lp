<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>On-Chain Financial Infrastructure</title>
  <rect width="400" height="260" fill="#111111" rx="12"/>
  <line x1="0" y1="65" x2="400" y2="65" stroke="#1a1a1a" stroke-width="0.75"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#1a1a1a" stroke-width="0.75"/>
  <!-- card -->
  <rect x="40" y="60" width="180" height="110" rx="10" fill="#1a1f2e" stroke="#5b8def" stroke-width="1.25"/>
  <text x="56" y="86" font-family="monospace" font-size="9" fill="#5b8def" opacity="0.6">TREASURY CARD</text>
  <text x="56" y="118" font-family="monospace" font-size="18" fill="#5b8def" font-weight="700">**** 4271</text>
  <text x="56" y="148" font-family="monospace" font-size="11" fill="#5b8def" opacity="0.7">$ 1,284,500.00</text>
  <circle cx="196" cy="146" r="10" fill="#5b8def" opacity="0.7"/>
  <circle cx="206" cy="146" r="10" fill="#5b8def" opacity="0.4"/>
  <!-- balance bars -->
  <rect x="240" y="60" width="120" height="110" rx="8" fill="#181c28" stroke="#1f2638" stroke-width="1"/>
  <text x="252" y="80" font-family="monospace" font-size="9" fill="#5b8def" opacity="0.5">PAYOUTS / 30D</text>
  <rect x="252" y="92" width="14" height="62" rx="2" fill="#5b8def" opacity="0.35"/>
  <rect x="270" y="100" width="14" height="54" rx="2" fill="#5b8def" opacity="0.5"/>
  <rect x="288" y="86" width="14" height="68" rx="2" fill="#5b8def" opacity="0.7"/>
  <rect x="306" y="110" width="14" height="44" rx="2" fill="#5b8def" opacity="0.4"/>
  <rect x="324" y="96" width="14" height="58" rx="2" fill="#5b8def" opacity="0.6"/>
  <!-- spending controls row -->
  <rect x="40" y="190" width="320" height="46" rx="8" fill="#181c28" stroke="#1f2638" stroke-width="1"/>
  <circle cx="62" cy="213" r="9" fill="#5b8def" opacity="0.25"/>
  <text x="62" y="217" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b8def">✓</text>
  <text x="82" y="210" font-family="monospace" font-size="10" fill="#5b8def" font-weight="700">Spending limit</text>
  <text x="82" y="224" font-family="monospace" font-size="9" fill="#5b8def" opacity="0.5">50,000 USDC / day</text>
  <rect x="220" y="202" width="120" height="22" rx="4" fill="#0f1626" stroke="#5b8def" stroke-width="1"/>
  <rect x="222" y="204" width="80" height="18" rx="3" fill="#5b8def" opacity="0.3"/>
</svg>
