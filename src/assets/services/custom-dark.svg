<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Custom</title>
  <desc>DPL core connecting protocol modules</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/><stop offset="100%" stop-color="#1a1620"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c"/><stop offset="35%" stop-color="#d94d4d"/>
      <stop offset="70%" stop-color="#8a5cd1"/><stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="gFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)" rx="12"/>
  <circle cx="200" cy="130" r="74" fill="none" stroke="url(#g)" stroke-width="0.6" stroke-dasharray="3,6" opacity="0.45"/>
  <circle cx="200" cy="130" r="108" fill="none" stroke="url(#g)" stroke-width="0.5" stroke-dasharray="2,8" opacity="0.25"/>
  <g fill="none" stroke="url(#g)" stroke-width="1" opacity="0.55">
    <line x1="115" y1="68" x2="180" y2="115"/>
    <line x1="285" y1="68" x2="220" y2="115"/>
    <line x1="70" y1="160" x2="178" y2="138"/>
    <line x1="330" y1="160" x2="222" y2="138"/>
    <line x1="200" y1="156" x2="200" y2="210"/>
  </g>
  <g>
    <circle cx="105" cy="68" r="26" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.25"/>
    <text x="105" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0eef5" font-weight="700">Safe</text>
    <circle cx="295" cy="68" r="26" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.25"/>
    <text x="295" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0eef5" font-weight="700">Uniswap</text>
    <circle cx="55" cy="163" r="22" fill="url(#gFill)" stroke="url(#g)" stroke-width="1" opacity="0.85"/>
    <text x="55" y="167" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc">BSC</text>
    <circle cx="345" cy="163" r="22" fill="url(#gFill)" stroke="url(#g)" stroke-width="1" opacity="0.85"/>
    <text x="345" y="167" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc">AAVE</text>
    <circle cx="200" cy="225" r="20" fill="url(#gFill)" stroke="url(#g)" stroke-width="1" opacity="0.75"/>
    <text x="200" y="229" text-anchor="middle" font-family="monospace" font-size="8" fill="#cfd2dc">custom</text>
  </g>
  <circle cx="200" cy="130" r="32" fill="url(#gFill)" stroke="url(#g)" stroke-width="2"/>
  <circle cx="200" cy="130" r="22" fill="none" stroke="url(#g)" stroke-width="0.75" opacity="0.55"/>
  <text x="200" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#cfd2dc" opacity="0.7">DPL</text>
  <text x="200" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0eef5" font-weight="700">core</text>
</svg>
