<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Lending Deployment and Support</title>
  <desc>Interest rate model curve with collateral visualization representing lending protocol deployment</desc>

  <rect width="400" height="260" fill="#111111" rx="12"/>

  <!-- axis -->
  <line x1="50" y1="25" x2="50" y2="215" stroke="#222" stroke-width="1"/>
  <line x1="50" y1="215" x2="375" y2="215" stroke="#222" stroke-width="1"/>

  <!-- horizontal guides -->
  <line x1="50" y1="160" x2="375" y2="160" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="4,4"/>
  <line x1="50" y1="105" x2="375" y2="105" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="4,4"/>
  <line x1="50" y1="50" x2="375" y2="50" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="4,4"/>

  <!-- borrow rate fill -->
  <path d="M50,215 C90,213 140,200 190,160 C230,128 250,80 280,50 C310,24 350,22 375,22 L375,215 Z" fill="#7c6af0" opacity="0.07"/>
  <!-- borrow rate curve -->
  <path d="M50,215 C90,213 140,200 190,160 C230,128 250,80 280,50 C310,24 350,22 375,22" fill="none" stroke="#7c6af0" stroke-width="2"/>

  <!-- supply rate curve (below borrow) -->
  <path d="M50,215 C90,213 160,208 210,185 C250,165 270,140 300,115 C330,90 360,78 375,75" fill="none" stroke="#7c6af0" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- optimal utilization marker -->
  <line x1="280" y1="50" x2="280" y2="215" stroke="#7c6af0" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <circle cx="280" cy="50" r="5" fill="#7c6af0"/>
  <rect x="285" y="40" width="66" height="17" rx="3" fill="#1c1a2e"/>
  <text x="318" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#9d8ff5">kink / optimal</text>

  <!-- collateral bars (left zone, supply side) -->
  <rect x="62" y="140" width="22" height="75" rx="3" fill="#7c6af0" opacity="0.5"/>
  <rect x="90" y="110" width="22" height="105" rx="3" fill="#7c6af0" opacity="0.35"/>
  <rect x="118" y="155" width="22" height="60" rx="3" fill="#7c6af0" opacity="0.2"/>
  <text x="73" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#554a80">ETH</text>
  <text x="101" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#554a80">USDC</text>
  <text x="129" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#554a80">wBTC</text>

  <!-- legend -->
  <line x1="60" y1="242" x2="84" y2="242" stroke="#7c6af0" stroke-width="2"/>
  <text x="90" y="246" font-family="monospace" font-size="8" fill="#7c6af0">borrow rate</text>
  <line x1="180" y1="242" x2="204" y2="242" stroke="#7c6af0" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="210" y="246" font-family="monospace" font-size="8" fill="#7c6af0" opacity="0.5">supply rate</text>

  <!-- axis labels -->
  <text x="210" y="256" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">utilization</text>
  <text x="28" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="#333" transform="rotate(-90,28,120)">interest rate</text>
</svg>
