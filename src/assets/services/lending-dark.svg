<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Lending</title>
  <desc>Interest rate curve with collateral bars</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/><stop offset="100%" stop-color="#1a1620"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f56a2c"/><stop offset="35%" stop-color="#d94d4d"/>
      <stop offset="70%" stop-color="#8a5cd1"/><stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="gFill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)" rx="12"/>
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.75">
    <line x1="50" y1="25" x2="50" y2="215"/><line x1="50" y1="215" x2="375" y2="215"/>
    <line x1="50" y1="160" x2="375" y2="160" stroke-dasharray="4,4"/>
    <line x1="50" y1="105" x2="375" y2="105" stroke-dasharray="4,4"/>
    <line x1="50" y1="50" x2="375" y2="50" stroke-dasharray="4,4"/>
  </g>
  <path d="M50,215 C90,213 140,200 190,160 C230,128 250,80 280,50 C310,24 350,22 375,22 L375,215 Z" fill="url(#gFill)"/>
  <path d="M50,215 C90,213 140,200 190,160 C230,128 250,80 280,50 C310,24 350,22 375,22" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M50,215 C90,213 160,208 210,185 C250,165 270,140 300,115 C330,90 360,78 375,75" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="280" y1="50" x2="280" y2="215" stroke="url(#g)" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <circle cx="280" cy="50" r="5" fill="url(#g)"/>
  <rect x="285" y="40" width="76" height="17" rx="8" fill="none" stroke="url(#g)" stroke-width="0.75" opacity="0.7"/>
  <text x="323" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#cfd2dc">kink / optimal</text>
  <rect x="62" y="140" width="22" height="75" rx="4" fill="url(#gBar)"/>
  <rect x="90" y="110" width="22" height="105" rx="4" fill="url(#gBar)" opacity="0.75"/>
  <rect x="118" y="155" width="22" height="60" rx="4" fill="url(#gBar)" opacity="0.55"/>
  <text x="73" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#9095a8">ETH</text>
  <text x="101" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#9095a8">USDC</text>
  <text x="129" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#9095a8">wBTC</text>
  <line x1="60" y1="246" x2="84" y2="246" stroke="url(#g)" stroke-width="2"/>
  <text x="90" y="250" font-family="monospace" font-size="8" fill="#cfd2dc">borrow rate</text>
  <line x1="180" y1="246" x2="204" y2="246" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="210" y="250" font-family="monospace" font-size="8" fill="#9095a8">supply rate</text>
