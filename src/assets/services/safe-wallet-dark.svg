<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Multisig</title>
  <desc>Multiple signers converging on a single safe</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/>
      <stop offset="100%" stop-color="#1a1620"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c"/>
      <stop offset="35%" stop-color="#d94d4d"/>
      <stop offset="70%" stop-color="#8a5cd1"/>
      <stop offset="100%" stop-color="#4f6bff"/>
    </linearGradient>
    <linearGradient id="gFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f56a2c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f6bff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <rect width="400" height="260" fill="url(#bg)" rx="12"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.75">
    <line x1="0" y1="65" x2="400" y2="65"/>
    <line x1="0" y1="130" x2="400" y2="130"/>
    <line x1="0" y1="195" x2="400" y2="195"/>
    <line x1="100" y1="0" x2="100" y2="260"/>
    <line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
  </g>

  <!-- 3 signer nodes -->
  <g>
    <circle cx="80" cy="80" r="20" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.5"/>
    <circle cx="80" cy="80" r="5" fill="url(#g)"/>
    <circle cx="80" cy="180" r="20" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.5"/>
    <circle cx="80" cy="180" r="5" fill="url(#g)"/>
    <circle cx="320" cy="130" r="20" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.5"/>
    <circle cx="320" cy="130" r="5" fill="url(#g)"/>
  </g>

  <!-- converging signature paths -->
  <g fill="none" stroke="url(#g)" stroke-width="1.25" stroke-linecap="round" opacity="0.7">
    <path d="M100,80 C150,80 170,110 190,130"/>
    <path d="M100,180 C150,180 170,150 190,130"/>
    <path d="M300,130 L210,130"/>
  </g>

  <!-- center safe -->
  <rect x="170" y="90" width="80" height="80" rx="6" fill="url(#gFill)" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="210" cy="130" r="22" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="210" cy="130" r="14" fill="none" stroke="url(#g)" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <circle cx="210" cy="130" r="5" fill="url(#g)"/>

  <!-- threshold badge -->
  <rect x="285" y="22" width="92" height="22" rx="11" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.7"/>
  <text x="331" y="37" text-anchor="middle" font-family="monospace" font-size="10" fill="#cfd2dc" opacity="0.85">2 / 3 signers</text>
</svg>
